<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تواصلي معنا — Luna</title>
  <meta name="description" content="تواصلي مع فريق Luna." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,400&family=Hanken+Grotesk:wght@400;500;600&family=Tajawal:wght@400;700&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../assets/css/styles.css" />
  <link rel="stylesheet" href="../assets/css/styles-rtl.css" />
  <link rel="icon" type="image/png" href="../assets/images/luna-icon.png" />
  <link rel="apple-touch-icon" href="../assets/images/luna-icon.png" />
</head>
<body>
  <a class="skip-link" href="#main">تخطٍّ إلى المحتوى</a>

  <header class="site-header">
    <div class="container site-header__inner">
      <a class="logo-link" href="index.html">
        <img class="logo-icon" src="../assets/images/luna-icon.png" alt="Luna" />
        <span class="luna-wordmark luna-wordmark--nav">Luna</span>
      </a>
      <button class="nav-toggle" aria-label="فتح القائمة" aria-expanded="false" aria-controls="primary-nav">
        <span class="nav-toggle__bar"></span>
        <span class="nav-toggle__bar"></span>
        <span class="nav-toggle__bar"></span>
      </button>
      <nav class="nav" id="primary-nav" aria-label="التنقل الرئيسي">
        <ul class="nav__list">
          <li><a class="nav__link" href="privacy.html">الخصوصية</a></li>
          <li><a class="nav__link" href="terms.html">الشروط</a></li>
          <li><a class="nav__link" href="contact.html">تواصلي معنا</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main id="main">
    <section class="section">
      <div class="container">
        <div class="contact">
          <h1 class="contact__title">تواصلي معنا</h1>
          <p class="contact__intro">أسئلة أو ملاحظات أو قصة تريدين مشاركتها: يسعدنا أن نسمع منكِ.</p>
          <a class="contact__card" href="mailto:contact@iamluna.app">contact@iamluna.app</a>
          <p class="contact__note">نردّ عادةً خلال يومَي عمل.</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer__inner">
      <div class="footer__wordmark">
        <img class="footer__avatar" src="../assets/images/luna-avatar.png" alt="" />
        <span class="brand-mark luna-wordmark luna-wordmark--footer">Luna</span>
      </div>
      <p class="footer__tagline">كل مرحلة منكِ</p>
      <nav class="footer__nav" aria-label="تذييل الصفحة">
        <a href="privacy.html">الخصوصية</a>
        <span class="footer__sep" aria-hidden="true">·</span>
        <a href="terms.html">الشروط</a>
        <span class="footer__sep" aria-hidden="true">·</span>
        <a href="contact.html">تواصلي معنا</a>
      </nav>
      <nav class="footer__langs" aria-label="اللغة">
        <a href="../contact.html">EN</a>
        <span class="footer__sep" aria-hidden="true">·</span>
        <a href="../fr/contact.html">FR</a>
        <span class="footer__sep" aria-hidden="true">·</span>
        <a href="contact.html" class="current">AR</a>
      </nav>
      <p class="footer__copyright">&copy; 2026 Luna</p>
    </div>
  </footer>

  <script>
    (function () {
      var toggle = document.querySelector(".nav-toggle");
      var nav = document.getElementById("primary-nav");
      if (!toggle || !nav) return;
      toggle.addEventListener("click", function () {
        var open = nav.classList.toggle("is-open");
        toggle.setAttribute("aria-expanded", open ? "true" : "false");
      });
    })();
  </script>
</body>
</html>
